steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/facelift-scan-api:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/facelift-scan-api:latest"

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/facelift-scan-api:latest"
